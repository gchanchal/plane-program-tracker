# Syncs the Cloudflare API token into a k8s secret that the cert-manager Issuer
# reads for the DNS-01 challenge. Sourced from the consolidated AWS Secrets
# Manager secret `plane-tracker`, which also holds SESSION_SECRET, PLANE_API_KEY,
# and the Docker Hub pull creds. Stays within the plane-tracker-* IRSA scope.
#
# The `plane-tracker` AWS secret must include (rotated token):
#   { ..., "cloudflare_api_token": "<ROTATED_TOKEN>" }
# The token must have Zone:DNS:Edit + Zone:Read on the plane.tools zone.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: cloudflare-api-token-secret
    creationPolicy: Owner
  data:
    - secretKey: api-token          # key name the Issuer references
      remoteRef:
        key: plane-tracker
        property: cloudflare_api_token
