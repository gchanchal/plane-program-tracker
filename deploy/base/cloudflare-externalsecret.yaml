# Syncs the Cloudflare API token into a k8s secret that the cert-manager Issuer
# reads for the DNS-01 challenge. Sourced from a DEDICATED AWS Secrets Manager
# secret (plane-tracker-cloudflare) so the plane-tracker IRSA role stays scoped
# to plane-tracker-* and can't read the shared github-actions secret's keys.
#
# Populate the AWS secret with the *rotated* token:
#   aws secretsmanager put-secret-value --secret-id plane-tracker-cloudflare \
#     --secret-string '{"cloudflare_api_token":"<ROTATED_TOKEN>"}' --region us-east-1
# The token must have Zone:DNS:Edit + Zone:Read on the plane.tools zone.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: cloudflare-api-token-secret
    creationPolicy: Owner
  data:
    - secretKey: api-token          # key name the Issuer references
      remoteRef:
        key: plane-tracker-cloudflare
        property: cloudflare_api_token
