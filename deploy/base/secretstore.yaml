# Namespaced SecretStore for AWS Secrets Manager. Requires the External Secrets
# Operator to be installed in the cluster (https://external-secrets.io).
# Auth uses the IRSA-annotated ServiceAccount (jwt / serviceAccountRef).
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: plane-tracker-esm
