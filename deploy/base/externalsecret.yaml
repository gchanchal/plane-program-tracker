# Syncs sensitive app values from AWS Secrets Manager into a k8s Secret.
#
# Source secret in AWS Secrets Manager (name: plane-tracker, region us-east-1):
#   {
#     "SESSION_SECRET": "<48+ random chars>",
#     "PLANE_API_KEY":  ""          # leave empty when PAT login is used
#   }
# Generate SESSION_SECRET: python3 -c "import secrets; print(secrets.token_urlsafe(48))"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: plane-tracker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: plane-tracker-secret
    creationPolicy: Owner
  data:
    - secretKey: SESSION_SECRET
      remoteRef:
        key: plane-tracker
        property: SESSION_SECRET
    - secretKey: PLANE_API_KEY
      remoteRef:
        key: plane-tracker
        property: PLANE_API_KEY
