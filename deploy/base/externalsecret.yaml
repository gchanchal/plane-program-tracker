# Syncs sensitive values from AWS Secrets Manager into a k8s Secret.
#
# Create the source secret in AWS Secrets Manager (name: plane-tracker) as JSON:
#   {
#     "SESSION_SECRET": "<48+ random chars>",
#     "PLANE_API_KEY":  ""          # leave empty when PAT login is used
#   }
# Generate SESSION_SECRET: python3 -c "import secrets; print(secrets.token_urlsafe(48))"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: plane-tracker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: plane-tracker-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: plane-tracker
