apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespace is intentionally NOT included: Fleet creates the target namespace
  # from defaultNamespace/targetNamespace, and a Namespace object is cluster-
  # scoped which Fleet forbids when targetNamespace is set.
  - serviceaccount.yaml
  - secretstore.yaml
  - externalsecret.yaml
  - dockerhub-pull-externalsecret.yaml
  - cloudflare-externalsecret.yaml
  - cert-issuer.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/name: plane-tracker
  app.kubernetes.io/part-of: plane-tracker

# NOTE: the image (name/newName/newTag) is set ONLY in the prod overlay, not here.
# If both base and overlay declared an `images:` transformer for the same name,
# the base would rename `plane-tracker` -> docker.io/makeplane/plane-tracker:latest
# first, and the overlay's transformer (keyed on `plane-tracker`) would no longer
# match — silently dropping the CI-pinned SHA tag. Keep it overlay-only.
