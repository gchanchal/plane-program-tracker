# Builds a Docker Hub image-pull credential (dockerconfigjson) from creds stored
# in the SAME AWS Secrets Manager secret (plane-tracker). Add these two keys to
# that secret so this can resolve:
#   {
#     ...,
#     "DOCKERHUB_USERNAME": "<docker hub user / org>",
#     "DOCKERHUB_TOKEN":    "<docker hub access token>"
#   }
# Keeping them in the plane-tracker secret means the existing plane-secret-reader
# IAM policy (scoped to plane-tracker-*) already covers it — no IAM change needed.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dockerhub-pull
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: dockerhub-pull
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: plane-tracker
        property: DOCKERHUB_USERNAME
    - secretKey: password
      remoteRef:
        key: plane-tracker
        property: DOCKERHUB_TOKEN
