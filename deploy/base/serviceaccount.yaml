# ServiceAccount used by the External Secrets SecretStore to authenticate to
# AWS Secrets Manager via IRSA (IAM Roles for Service Accounts).
#
# Create the IAM role with a trust policy for your EKS OIDC provider and grant
# secretsmanager:GetSecretValue + secretsmanager:DescribeSecret on the
# plane-tracker secret ARN, then put its ARN in the annotation below.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: plane-tracker-esm
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::426043895157:role/plane-tracker-secrets-reader
