apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plane-tracker

resources:
  - ../../base

# CI updates the tag here via `kustomize edit set image`.
images:
  - name: plane-tracker
    newName: PLACEHOLDER_ACCOUNT.dkr.ecr.PLACEHOLDER_REGION.amazonaws.com/plane-tracker
    newTag: latest
