name: build-and-push

# Builds the image, pushes to ECR, then bumps the image tag in the prod overlay
# so Fleet redeploys. Skips runs triggered by its own tag-bump commit.
on:
  push:
    branches: [main]
    paths-ignore:
      - "deploy/overlays/**"
      - "**/*.md"

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: plane-tracker
  # GitHub OIDC -> IAM role with ecr:* on the repo + sts:AssumeRoleWithWebIdentity trust.
  AWS_ROLE_ARN: arn:aws:iam::426043895157:role/plane-tracker-ci

permissions:
  id-token: write      # request the OIDC token
  contents: write      # commit the tag bump back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$TAG" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Install kustomize
        run: |
          curl -sSL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump image tag in prod overlay
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          cd deploy/overlays/prod
          kustomize edit set image "plane-tracker=$REGISTRY/$ECR_REPOSITORY:$TAG"

      - name: Commit and push tag bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/overlays/prod/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No tag change to commit."
          else
            git commit -m "ci: deploy ${GITHUB_SHA::7} [skip ci]"
            git push
          fi
